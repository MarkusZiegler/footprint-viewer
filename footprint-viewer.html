<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Footprint Viewer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d0d0f;
    --panel: #161618;
    --border: #2a2a2e;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0ec;
    --muted: #888880;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--muted);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* BUTTONS */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
  }
  .btn-primary:active { opacity: 0.8; transform: scale(0.97); }

  .btn-ghost {
    background: var(--border);
    color: var(--muted);
  }
  .btn-ghost.active {
    background: #2a2a1a;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-ghost:active { opacity: 0.7; }

  .btn-icon {
    background: var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border-radius: 8px;
  }
  .btn-icon:active { opacity: 0.7; transform: scale(0.95); }

  /* MAP */
  #map {
    flex: 1;
    width: 100%;
    z-index: 1;
  }

  /* BOTTOM PANEL */
  .bottom-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
    transition: all 0.25s ease;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .controls-row::-webkit-scrollbar { display: none; }

  .layer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    margin-right: 2px;
  }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    padding: 0;
  }

  .stat {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-top: 3px;
  }

  /* DROP OVERLAY */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,15,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    gap: 16px;
    backdrop-filter: blur(4px);
  }

  .drop-overlay.hidden { display: none; }

  .drop-icon {
    font-size: 52px;
    animation: float 2.5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .drop-title {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .drop-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    max-width: 260px;
    line-height: 1.5;
  }

  .drop-btn {
    margin-top: 8px;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 12px;
  }

  /* LOADING */
  .loading-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    width: 0%;
    z-index: 3000;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  /* TOAST */
  .toast {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e20;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 4000;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Leaflet overrides */
  .leaflet-control-zoom {
    border: none !important;
    box-shadow: none !important;
  }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    width: 36px !important;
    height: 36px !important;
    line-height: 36px !important;
    font-size: 18px !important;
    margin-bottom: 4px !important;
  }
  .leaflet-control-attribution {
    background: rgba(13,13,15,0.7) !important;
    color: #555 !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #666 !important; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <div class="logo">Footprint <span>/ Viewer</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-icon" id="btnFit" title="Karte einpassen" style="display:none">⊡</button>
    <button class="btn btn-primary" id="btnLoad">GPX laden</button>
  </div>
</header>

<!-- MAP -->
<div id="map"></div>

<!-- EMPTY OVERLAY -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-icon">🗺️</div>
  <div class="drop-title">Deine Wege</div>
  <div class="drop-sub">Exportiere deine Tracks aus der Footprint-App und lade die GPX-Datei hier.</div>
  <button class="btn btn-primary drop-btn" id="btnLoadOverlay">GPX-Datei wählen</button>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel" id="bottomPanel" style="display:none">
  <div class="controls-row">
    <span class="layer-label">Layer</span>
    <button class="btn btn-ghost active" id="btnRoute">🛤 Route</button>
    <button class="btn btn-ghost active" id="btnHeat">🔥 Heatmap</button>
    <div class="divider"></div>
    <span class="layer-label">Karte</span>
    <button class="btn btn-ghost active" id="btnMapDark">Dunkel</button>
    <button class="btn btn-ghost" id="btnMapOSM">OSM</button>
  </div>
  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <span class="stat-val" id="statDist">—</span>
      <span class="stat-label">km gesamt</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statPoints">—</span>
      <span class="stat-label">Punkte</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statDays">—</span>
      <span class="stat-label">Tage</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statRange">—</span>
      <span class="stat-label">Zeitraum</span>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".gpx" style="display:none" multiple>

<script>
// ── MAP SETUP ──────────────────────────────────────────────────────────────
const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap, © CARTO',
  subdomains: 'abcd', maxZoom: 20
});

const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 20
});

const map = L.map('map', {
  center: [48.137, 11.576], // München
  zoom: 11,
  zoomControl: true,
  layers: [darkTile]
});

// ── STATE ─────────────────────────────────────────────────────────────────
let routeLayer = null;
let heatLayer  = null;
let allPoints  = [];
let showRoute  = true;
let showHeat   = true;
let currentMap = 'dark';
let allBounds  = null;

// ── GPX PARSER ────────────────────────────────────────────────────────────
function parseGPX(text) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(text, 'application/xml');
  const pts    = [];
  let minDate  = Infinity, maxDate = -Infinity;

  // trkpt and wpt
  const nodes = [...doc.querySelectorAll('trkpt'), ...doc.querySelectorAll('wpt')];
  nodes.forEach(pt => {
    const lat  = parseFloat(pt.getAttribute('lat'));
    const lon  = parseFloat(pt.getAttribute('lon'));
    if (isNaN(lat) || isNaN(lon)) return;
    const timeEl = pt.querySelector('time');
    const ts = timeEl ? new Date(timeEl.textContent).getTime() : null;
    if (ts) { minDate = Math.min(minDate, ts); maxDate = Math.max(maxDate, ts); }
    pts.push({ lat, lon, ts });
  });

  return { pts, minDate, maxDate };
}

// ── HAVERSINE DISTANCE ────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lon - a.lon) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 +
            Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function totalDistance(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += haversine(pts[i-1], pts[i]);
  return d;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderData(newPts, minDate, maxDate) {
  // Merge
  allPoints = [...allPoints, ...newPts];

  // Remove old layers
  if (routeLayer) map.removeLayer(routeLayer);
  if (heatLayer)  map.removeLayer(heatLayer);

  // Route – thin neon line
  const latlngs = allPoints.map(p => [p.lat, p.lon]);
  routeLayer = L.polyline(latlngs, {
    color: '#e8ff47',
    weight: 1.5,
    opacity: 0.6,
    smoothFactor: 1
  });

  // Heatmap
  const heatData = allPoints.map(p => [p.lat, p.lon, 1]);
  heatLayer = L.heatLayer(heatData, {
    radius: 18,
    blur: 22,
    maxZoom: 17,
    gradient: { 0.0: '#1a1aff', 0.3: '#00ccff', 0.6: '#ff6b35', 1.0: '#e8ff47' }
  });

  if (showRoute) routeLayer.addTo(map);
  if (showHeat)  heatLayer.addTo(map);

  // Bounds
  if (latlngs.length > 0) {
    allBounds = L.latLngBounds(latlngs);
    map.fitBounds(allBounds, { padding: [20, 20] });
  }

  // Stats
  const dist  = totalDistance(allPoints);
  const days  = allPoints.reduce((s, p) => {
    if (!p.ts) return s;
    const d = new Date(p.ts).toDateString();
    s.add(d);
    return s;
  }, new Set()).size;

  document.getElementById('statDist').textContent   = dist > 0 ? Math.round(dist).toLocaleString('de') : '—';
  document.getElementById('statPoints').textContent = allPoints.length.toLocaleString('de');
  document.getElementById('statDays').textContent   = days > 0 ? days.toLocaleString('de') : '—';

  if (minDate !== Infinity && maxDate !== -Infinity) {
    const fmt = d => new Date(d).toLocaleDateString('de', { year:'2-digit', month:'short' });
    document.getElementById('statRange').textContent = fmt(minDate) + '–' + fmt(maxDate);
  } else {
    document.getElementById('statRange').textContent = '—';
  }

  // Show UI
  document.getElementById('dropOverlay').classList.add('hidden');
  document.getElementById('bottomPanel').style.display = '';
  document.getElementById('btnFit').style.display = '';
}

// ── FILE LOADING ──────────────────────────────────────────────────────────
async function loadFiles(files) {
  if (!files || files.length === 0) return;
  setLoading(true);
  let totalPts = 0, minD = Infinity, maxD = -Infinity;
  const allNew = [];

  for (const file of files) {
    const text = await file.text();
    const { pts, minDate, maxDate } = parseGPX(text);
    allNew.push(...pts);
    totalPts += pts.length;
    minD = Math.min(minD, minDate);
    maxD = Math.max(maxD, maxDate);
  }

  setLoading(false);

  if (totalPts === 0) {
    showToast('⚠️ Keine GPS-Punkte gefunden');
    return;
  }

  renderData(allNew, minD, maxD);
  showToast(`✓ ${totalPts.toLocaleString('de')} Punkte aus ${files.length} Datei${files.length > 1 ? 'en' : ''} geladen`);
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
document.getElementById('btnLoad').addEventListener('click', () => fileInput.click());
document.getElementById('btnLoadOverlay').addEventListener('click', () => fileInput.click());

document.getElementById('fileInput').addEventListener('change', e => {
  loadFiles(e.target.files);
  e.target.value = '';
});

document.getElementById('btnFit').addEventListener('click', () => {
  if (allBounds) map.fitBounds(allBounds, { padding: [20, 20] });
});

document.getElementById('btnRoute').addEventListener('click', function() {
  showRoute = !showRoute;
  this.classList.toggle('active', showRoute);
  if (routeLayer) {
    showRoute ? routeLayer.addTo(map) : map.removeLayer(routeLayer);
  }
});

document.getElementById('btnHeat').addEventListener('click', function() {
  showHeat = !showHeat;
  this.classList.toggle('active', showHeat);
  if (heatLayer) {
    showHeat ? heatLayer.addTo(map) : map.removeLayer(heatLayer);
  }
});

document.getElementById('btnMapDark').addEventListener('click', function() {
  if (currentMap === 'dark') return;
  map.removeLayer(osmTile);
  darkTile.addTo(map);
  darkTile.bringToBack();
  currentMap = 'dark';
  this.classList.add('active');
  document.getElementById('btnMapOSM').classList.remove('active');
});

document.getElementById('btnMapOSM').addEventListener('click', function() {
  if (currentMap === 'osm') return;
  map.removeLayer(darkTile);
  osmTile.addTo(map);
  osmTile.bringToBack();
  currentMap = 'osm';
  this.classList.add('active');
  document.getElementById('btnMapDark').classList.remove('active');
});

// ── HELPERS ───────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loadingBar').style.width = on ? '85%' : '100%';
  if (!on) setTimeout(() => { document.getElementById('loadingBar').style.width = '0%'; }, 400);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── DRAG & DROP (für Desktop) ─────────────────────────────────────────────
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  loadFiles(e.dataTransfer.files);
});
</script>
</body>
</html>
